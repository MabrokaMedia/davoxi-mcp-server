name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup shared packages
        run: |
          git clone --depth 1 https://github.com/MabrokaMedia/davoxi-shared.git /tmp/davoxi-shared
          ln -s /tmp/davoxi-shared/packages $GITHUB_WORKSPACE/../packages
          cd /tmp/davoxi-shared/packages/client
          npm install --ignore-scripts
          npx tsc || true

      - run: npm ci
      - run: npm run build
